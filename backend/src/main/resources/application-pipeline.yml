hostSuffix: "replaced_by_pipeline"
hostDatabase: database.${hostSuffix}
hostKeycloak: oauth.${hostSuffix}

spring:
  rabbitmq:
    host: ${hostRabbitMQ}
  datasource:
    url: jdbc:postgresql://${hostDatabase}:5432/nls-maps?ApplicationName=nls-accessibility-map-api&stringtype=unspecified
    username: nls-maps
    password: nls-maps
nls:
  keycloak:
    url: http://${hostKeycloak}:8000/auth

nu:
  ndw:
    nls:
      accessibilitymap:
        trafficsignclient:
          api:
            url: http://${hostWiremock}:8888/api/rest/static-road-data/traffic-signs/v4
        trafficSigns:
          emission-zone:
            client:
              url: http://${hostWiremock}:8888/api/area/ibbm/emission-zones/v1
          cache:
            folder: "./cache/trafficSigns/"
        network:
          cache:
            folder: "./cache/network"

      springboot:
        messaging:
          broker-uri: amqp://guest:guest@${hostRabbitMQ}:5672?heartbeat=300
logging:
  level:
    root: TRACE
    nu.ndw.nls: TRACE
